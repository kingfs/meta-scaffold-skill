version: 2

project_name: __CLI_DIR_NAME__

before:
  hooks:
    - go mod tidy
    - go test ./... -count=1

builds:
  - id: __CLI_DIR_NAME__
    main: ./cmd/__CLI_DIR_NAME__
    binary: __CLI_DIR_NAME__
    ldflags:
      - -s -w
      - -X __MODULE_PATH__/internal/version.Version={{.Version}}
      - -X __MODULE_PATH__/internal/version.Commit={{.Commit}}
      - -X __MODULE_PATH__/internal/version.Date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
